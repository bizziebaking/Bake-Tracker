<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Bake Planner">
<title>Bake Planner</title>
<style>
  :root {
    --navy:       #1a3558;
    --blue:       #2558a0;
    --blue-mid:   #5b9fd4;
    --blue-pale:  #eaf2fb;
    --blue-light: #d0e8f8;
    --bg:         #f4f8fd;
    --border:     #c2d9ef;
    --text:       #1a2a3d;
    --text-mid:   #3d5a7a;
    --text-light: #7a9bbf;
    --green-bg:   #e8f5e9;
    --green:      #2e7d32;
    --green-bd:   #81c784;
    --orange:     #c0560a;
    --orange-bg:  #fff3eb;
    --orange-bd:  #f5c999;
    --red:        #c0392b;
    --red-bg:     #fdecea;
    --white:      #ffffff;
    --card-shadow: 0 2px 12px rgba(26,53,88,0.08);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body {
    height: 100%;
    font-family: -apple-system, 'SF Pro Text', sans-serif;
    background: var(--bg);
    color: var(--text);
    overflow: hidden;
  }

  /* ── Screens ── */
  .screen {
    display: none;
    flex-direction: column;
    height: 100vh;
    height: 100dvh;
    overflow: hidden;
  }
  .screen.active { display: flex; }

  /* ── Top bar ── */
  .topbar {
    background: var(--navy);
    padding: 52px 20px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }
  .topbar h1 {
    color: white;
    font-size: 19px;
    font-weight: 700;
    flex: 1;
  }
  .back-btn {
    background: rgba(255,255,255,0.15);
    border: none;
    color: white;
    font-size: 14px;
    font-weight: 600;
    padding: 8px 14px;
    border-radius: 10px;
    cursor: pointer;
    font-family: inherit;
  }
  .back-btn:active { background: rgba(255,255,255,0.25); }

  /* ── Scrollable content ── */
  .content {
    flex: 1;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding: 16px;
  }

  /* ── Cards ── */
  .card {
    background: var(--white);
    border-radius: 16px;
    border: 1.5px solid var(--border);
    margin-bottom: 16px;
    overflow: hidden;
    box-shadow: var(--card-shadow);
  }
  .card-head {
    padding: 14px 18px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1.5px solid var(--border);
    background: var(--blue-pale);
  }
  .card-head h2 {
    font-size: 15px;
    font-weight: 700;
    color: var(--navy);
    letter-spacing: 0.01em;
  }
  .card-head .meta {
    font-size: 12px;
    color: var(--text-light);
  }
  .card-body { padding: 14px 16px; }

  /* ── Add button (on summary cards) ── */
  .add-card-btn {
    background: var(--blue);
    color: white;
    border: none;
    padding: 8px 16px;
    border-radius: 10px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    flex-shrink: 0;
  }
  .add-card-btn:active { background: var(--navy); }

  /* ── Bake to-do items ── */
  .todo-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 13px 4px;
    border-bottom: 1px solid var(--border);
    transition: opacity 0.2s;
  }
  .todo-item:last-child { border-bottom: none; }
  .todo-item.done { opacity: 0.55; }

  .check-circle {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    border: 2px solid var(--border);
    background: white;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.15s;
    color: white;
  }
  .check-circle.ticked {
    background: var(--green);
    border-color: var(--green);
  }

  .todo-name {
    flex: 1;
    font-size: 16px;
    font-weight: 500;
  }
  .todo-item.done .todo-name {
    text-decoration: line-through;
    color: var(--text-light);
  }

  .del-btn {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    border: none;
    background: transparent;
    color: var(--text-light);
    font-size: 20px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    line-height: 1;
    font-family: inherit;
  }
  .del-btn:active { background: var(--red-bg); color: var(--red); }

  /* ── Week nav strip ── */
  .week-strip {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 14px;
  }
  .week-text {
    flex: 1;
    font-size: 13px;
    font-weight: 600;
    color: var(--text-mid);
    text-align: center;
  }
  .wk-btn {
    background: var(--blue-pale);
    border: 1.5px solid var(--border);
    color: var(--blue);
    font-size: 18px;
    width: 34px;
    height: 34px;
    border-radius: 9px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-family: inherit;
  }
  .wk-btn:active { background: var(--blue-light); }

  /* ── Summary stats ── */
  .stat-row {
    display: flex;
    gap: 10px;
    margin-bottom: 14px;
  }
  .stat-box {
    flex: 1;
    background: var(--blue-pale);
    border-radius: 12px;
    padding: 12px;
    text-align: center;
  }
  .stat-box .num {
    font-size: 26px;
    font-weight: 700;
    color: var(--navy);
    line-height: 1;
  }
  .stat-box .lbl {
    font-size: 11px;
    color: var(--text-light);
    margin-top: 4px;
  }
  .stat-box.warn { background: var(--orange-bg); }
  .stat-box.warn .num { color: var(--orange); }

  /* ── Freezer items ── */
  .freezer-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 13px 4px;
    border-bottom: 1px solid var(--border);
  }
  .freezer-item:last-child { border-bottom: none; }
  .fi-name {
    flex: 1;
    font-size: 16px;
    font-weight: 500;
  }
  .fi-date {
    font-size: 11px;
    color: var(--text-light);
  }
  .fi-portions {
    font-size: 22px;
    font-weight: 700;
    color: var(--navy);
    min-width: 32px;
    text-align: right;
  }
  .fi-lbl {
    font-size: 11px;
    color: var(--text-light);
    align-self: flex-end;
    padding-bottom: 2px;
  }
  .low-tag {
    font-size: 10px;
    font-weight: 700;
    background: var(--orange);
    color: white;
    padding: 2px 8px;
    border-radius: 20px;
    flex-shrink: 0;
  }
  .use-btn {
    background: var(--blue-pale);
    color: var(--blue);
    border: 1.5px solid var(--border);
    padding: 7px 12px;
    border-radius: 9px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    flex-shrink: 0;
    font-family: inherit;
  }
  .use-btn:active { background: var(--blue-light); }

  /* ── Empty states ── */
  .empty {
    text-align: center;
    padding: 24px 16px;
    color: var(--text-light);
    font-size: 14px;
    line-height: 1.7;
  }

  /* ══ ADD SCREENS ══ */
  .add-form {
    padding: 24px 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .field-group {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .field-label {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-mid);
  }
  .field-input {
    padding: 15px 16px;
    border: 1.5px solid var(--border);
    border-radius: 12px;
    font-size: 17px;
    font-family: inherit;
    color: var(--text);
    background: white;
    outline: none;
    width: 100%;
  }
  .field-input:focus { border-color: var(--blue-mid); }
  .field-input::placeholder { color: var(--text-light); }
  .field-input[type="number"] { -moz-appearance: textfield; }
  .field-input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; }

  .submit-btn {
    background: var(--blue);
    color: white;
    border: none;
    padding: 16px;
    border-radius: 14px;
    font-size: 17px;
    font-weight: 700;
    cursor: pointer;
    width: 100%;
    font-family: inherit;
    margin-top: 8px;
  }
  .submit-btn:active { background: var(--navy); }
</style>
</head>
<body>

<!-- ══ SUMMARY SCREEN ══ -->
<div class="screen active" id="screen-summary">
  <div class="topbar">
    <h1>The Robins Nest</h1>
  </div>
  <div class="content">

    <!-- Bake plan card -->
    <div class="card">
      <div class="card-head">
        <div>
          <h2>This Week's Bakes</h2>
          <div class="meta" id="week-meta"></div>
        </div>
        <button class="add-card-btn" onclick="showScreen('add-bake')">+ Add</button>
      </div>
      <div class="card-body">
        <div class="week-strip">
          <button class="wk-btn" onclick="changeWeek(-1)">&#x2039;</button>
          <div class="week-text" id="week-label"></div>
          <button class="wk-btn" onclick="changeWeek(1)">&#x203a;</button>
        </div>
        <div class="stat-row" id="bake-stats"></div>
        <div id="todo-list"></div>
      </div>
    </div>

    <!-- Freezer card -->
    <div class="card">
      <div class="card-head">
        <div>
          <h2>Freezer Stock</h2>
          <div class="meta" id="freezer-meta"></div>
        </div>
        <button class="add-card-btn" onclick="showScreen('add-freezer')">+ Add</button>
      </div>
      <div class="card-body">
        <div id="freezer-list"></div>
      </div>
    </div>

  </div>
</div>

<!-- ══ ADD BAKE SCREEN ══ -->
<div class="screen" id="screen-add-bake">
  <div class="topbar">
    <button class="back-btn" onclick="showScreen('summary')">Back</button>
    <h1>Add a Bake</h1>
  </div>
  <div class="add-form">
    <div class="field-group">
      <div class="field-label">What are you baking?</div>
      <input class="field-input" type="text" id="bake-input" placeholder="e.g. Lemon Drizzle"
        onkeydown="if(event.key==='Enter')saveBake()">
    </div>
    <button class="submit-btn" onclick="saveBake()">Add to this week</button>
  </div>
</div>

<!-- ══ ADD FREEZER SCREEN ══ -->
<div class="screen" id="screen-add-freezer">
  <div class="topbar">
    <button class="back-btn" onclick="showScreen('summary')">Back</button>
    <h1>Add to Freezer</h1>
  </div>
  <div class="add-form">
    <div class="field-group">
      <div class="field-label">What did you freeze?</div>
      <input class="field-input" type="text" id="f-name" placeholder="e.g. School Cake"
        onkeydown="if(event.key==='Enter')document.getElementById('f-qty').focus()">
    </div>
    <div class="field-group">
      <div class="field-label">How many portions?</div>
      <input class="field-input" type="number" id="f-qty" placeholder="e.g. 12" min="1"
        onkeydown="if(event.key==='Enter')saveFreezer()">
    </div>
    <button class="submit-btn" onclick="saveFreezer()">Add to Freezer</button>
  </div>
</div>

<script>
const KEY = 'rnbp_v4';
function uid() { return Math.random().toString(36).slice(2, 9); }
function defaultData() { return { weeks: {}, freezer: [] }; }

let state = (() => {
  try { const r = localStorage.getItem(KEY); return r ? JSON.parse(r) : defaultData(); }
  catch { return defaultData(); }
})();
function save() { localStorage.setItem(KEY, JSON.stringify(state)); }

// ── Screens ───────────────────────────────────────────
function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + name).classList.add('active');
  if (name === 'summary') { renderTodo(); renderFreezer(); }
  if (name === 'add-bake') {
    document.getElementById('bake-input').value = '';
    setTimeout(() => document.getElementById('bake-input').focus(), 300);
  }
  if (name === 'add-freezer') {
    document.getElementById('f-name').value = '';
    document.getElementById('f-qty').value = '';
    setTimeout(() => document.getElementById('f-name').focus(), 300);
  }
}

// ── Week helpers ──────────────────────────────────────
let offset = 0;
function getMonday(off = 0) {
  const d = new Date(), day = d.getDay();
  d.setDate(d.getDate() - day + (day === 0 ? -6 : 1) + off * 7);
  d.setHours(0, 0, 0, 0); return d;
}
function weekKey(off = 0) {
  const m = getMonday(off), yr = m.getFullYear();
  const s = new Date(yr, 0, 1);
  const wk = Math.ceil(((m - s) / 86400000 + s.getDay() + 1) / 7);
  return yr + '-W' + String(wk).padStart(2, '0');
}
function weekLabel(off = 0) {
  const m = getMonday(off), e = new Date(m);
  e.setDate(m.getDate() + 6);
  const f = d => d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
  return f(m) + ' \u2013 ' + f(e);
}
function getWeek(key) {
  if (!state.weeks[key]) state.weeks[key] = [];
  return state.weeks[key];
}
function changeWeek(dir) { offset += dir; renderTodo(); }

// ── To-do ─────────────────────────────────────────────
function renderTodo() {
  const key = weekKey(offset);
  document.getElementById('week-label').textContent = weekLabel(offset);
  const items = getWeek(key);
  const done = items.filter(i => i.done).length;
  const total = items.length;

  document.getElementById('week-meta').textContent =
    total > 0 ? done + ' of ' + total + ' done' : '';

  // Stats
  document.getElementById('bake-stats').innerHTML = total > 0 ?
    '<div class="stat-box"><div class="num">' + (total - done) + '</div><div class="lbl">To bake</div></div>' +
    '<div class="stat-box"><div class="num">' + done + '</div><div class="lbl">Done</div></div>' : '';

  // List — undone first
  const sorted = [...items.filter(i => !i.done), ...items.filter(i => i.done)];
  const el = document.getElementById('todo-list');

  if (!items.length) {
    el.innerHTML = '<div class="empty">Nothing planned yet.\nTap + Add to get started.</div>';
    return;
  }

  el.innerHTML = sorted.map(item =>
    '<div class="todo-item' + (item.done ? ' done' : '') + '">' +
      '<div class="check-circle' + (item.done ? ' ticked' : '') + '" onclick="toggleDone(\'' + item.id + '\')">' +
        (item.done ? '\u2713' : '') +
      '</div>' +
      '<div class="todo-name">' + item.name + '</div>' +
      '<button class="del-btn" onclick="deleteTodo(\'' + item.id + '\')">&#xD7;</button>' +
    '</div>'
  ).join('');
}

function saveBake() {
  const name = document.getElementById('bake-input').value.trim();
  if (!name) return;
  getWeek(weekKey(offset)).push({ id: uid(), name, done: false });
  save();
  showScreen('summary');
}

function toggleDone(id) {
  const item = getWeek(weekKey(offset)).find(i => i.id === id);
  if (item) { item.done = !item.done; save(); renderTodo(); }
}

function deleteTodo(id) {
  const key = weekKey(offset);
  state.weeks[key] = getWeek(key).filter(i => i.id !== id);
  save(); renderTodo();
}

// ── Freezer ───────────────────────────────────────────
function renderFreezer() {
  const el = document.getElementById('freezer-list');
  const lowCount = state.freezer.filter(f => f.portions < 5).length;
  const total = state.freezer.reduce((s, f) => s + f.portions, 0);

  document.getElementById('freezer-meta').textContent =
    state.freezer.length > 0 ? total + ' portions total' + (lowCount > 0 ? ' \u00b7 ' + lowCount + ' low' : '') : '';

  if (!state.freezer.length) {
    el.innerHTML = '<div class="empty">Nothing in the freezer.\nTap + Add to log something.</div>';
    return;
  }

  const today = new Date();
  const sorted = [...state.freezer].sort((a, b) => new Date(a.dateFrozen) - new Date(b.dateFrozen));

  el.innerHTML = sorted.map(f => {
    const days = Math.floor((today - new Date(f.dateFrozen)) / 86400000);
    const dateLabel = days === 0 ? 'Today' : days === 1 ? 'Yesterday' : days + 'd ago';
    const low = f.portions < 5;
    return '<div class="freezer-item">' +
      '<div class="fi-name">' + f.name + '</div>' +
      (low ? '<span class="low-tag">Low</span>' : '') +
      '<div class="fi-date">' + dateLabel + '</div>' +
      '<div class="fi-portions">' + f.portions + '</div>' +
      '<div class="fi-lbl">portions</div>' +
      '<button class="use-btn" onclick="usePortions(\'' + f.id + '\')">Use</button>' +
      '<button class="del-btn" onclick="removeFreezer(\'' + f.id + '\')">&#xD7;</button>' +
    '</div>';
  }).join('');
}

function saveFreezer() {
  const name = document.getElementById('f-name').value.trim();
  const portions = parseInt(document.getElementById('f-qty').value);
  if (!name || !portions) return;
  state.freezer.push({ id: uid(), name, portions, dateFrozen: new Date().toISOString().split('T')[0] });
  save();
  showScreen('summary');
}

function usePortions(id) {
  const f = state.freezer.find(f => f.id === id);
  if (!f) return;
  const use = parseInt(prompt('Using how many portions of ' + f.name + '?\n(' + f.portions + ' in freezer)'));
  if (isNaN(use) || use <= 0) return;
  f.portions -= use;
  if (f.portions <= 0) state.freezer = state.freezer.filter(x => x.id !== id);
  save(); renderFreezer();
}

function removeFreezer(id) {
  const f = state.freezer.find(f => f.id === id);
  if (!f || !confirm('Remove ' + f.name + '?')) return;
  state.freezer = state.freezer.filter(x => x.id !== id);
  save(); renderFreezer();
}

// ── Init ──────────────────────────────────────────────
renderTodo();
renderFreezer();
</script>
</body>
</html>
